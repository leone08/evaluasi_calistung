<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Evaluasi Hasil Belajar Siswa</title>

<style>

body{
    font-family:'Segoe UI',sans-serif;
    background:#eef2f7;
    margin:0;
    padding:35px;
}

.header{
    background:#4a89dc;
    color:white;
    text-align:center;
    padding:25px;
    border-radius:20px;
    font-size:42px;
    font-weight:bold;
    margin-bottom:25px;
    box-shadow:0 3px 15px rgba(0,0,0,0.1);
}

.container{
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 3px 15px rgba(0,0,0,0.1);
}

.search{
    width:350px;
    padding:12px 15px;
    margin:0 auto 20px auto;
    display:block;
    border-radius:30px;
    border:1px solid #ccc;
    font-size:16px;
}

.info{
    text-align:center;
    font-size:18px;
    font-weight:bold;
    color:#555;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#4a89dc;
    color:white;
    padding:15px;
}

td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #e5e5e5;
}

tr:hover{
    background:#f7f9fc;
}

.nama{
    background:#e8f1ff;
    color:#2d6cdf;
    padding:8px 15px;
    border-radius:20px;
    display:inline-block;
}

.nilai{
    font-size:20px;
    font-weight:bold;
    color:#222;
}

.ket{
    font-size:14px;
    margin-top:5px;
    color:#666;
}

.badge-hijau{
    background:#d4edda;
    color:#155724;
    padding:6px 12px;
    border-radius:20px;
    font-weight:bold;
}

.badge-merah{
    background:#f8d7da;
    color:#721c24;
    padding:6px 12px;
    border-radius:20px;
    font-weight:bold;
}

.footer{
    text-align:center;
    margin-top:25px;
    color:#666;
    font-size:20px;
}

</style>
</head>

<body>

<div class="header">
📚 Evaluasi Hasil Belajar Siswa
</div>

<div class="container">

<input
class="search"
type="text"
id="search"
placeholder="🔍 Cari nama siswa..."
onkeyup="filterTable()">

<div class="info" id="jumlahSiswa">
Jumlah siswa : 0
</div>

<table>

<thead>
<tr>
<th>No</th>
<th>Tanggal</th>
<th>Nama</th>
<th>Membaca</th>
<th>Menulis</th>
<th>Berhitung</th>
<th>Favorit</th>
<th>Terbaik</th>
<th>Perlu Ditingkatkan</th>
</tr>
</thead>

<tbody id="tabel">
</tbody>

</table>

</div>

<div class="footer">
Sistem Evaluasi Calistung SLB-C Sumbersari
</div>

<script>

fetch("https://script.google.com/macros/s/AKfycbz4VT-AitIKi-IO3LNo8-dPJOg-iOrOCdrxAv68eq04WtftrOV5vu1r5ONUgwT9ipuCsg/exec")
.then(res => res.json())
.then(data => {

let html = "";

for(let i=1;i<data.length;i++)
{
    let row = data[i];

    html += `
    <tr>

    <td>${i}</td>

<td>${new Date(row[0]).toLocaleString('id-ID',{
day:'2-digit',
month:'2-digit',
year:'numeric',
hour:'2-digit',
minute:'2-digit'
})}</td>

<td>
    <span class="nama">${row[1]}</span>
</td>

<td>
    <div class="nilai">${row[2]}</div>
    <div class="ket">${row[3]}</div>
</td>

<td>
    <div class="nilai">${row[4]}</div>
    <div class="ket">${row[5]}</div>
</td>

<td>
    <div class="nilai">${row[6]}</div>
    <div class="ket">${row[7]}</div>
</td>

<td>${row[8]}</td>

<td>
    <span class="badge-hijau">
    ${row[9]}
    </span>
</td>

<td>
    <span class="badge-merah">
    ${row[10]}
    </span>
</td>

    </tr>
    `;
}

document.getElementById("tabel").innerHTML = html;

document.getElementById("jumlahSiswa").innerHTML =
"Jumlah siswa : " + (data.length - 1);

});

function filterTable()
{
    let input =
    document.getElementById("search")
    .value
    .toLowerCase();

    let rows =
    document.querySelectorAll("#tabel tr");

    rows.forEach(row=>{

        let nama =
        row.children[2]
        .innerText
        .toLowerCase();

        row.style.display =
        nama.includes(input)
        ? ""
        : "none";

    });
}

</script>

</body>
</html>
