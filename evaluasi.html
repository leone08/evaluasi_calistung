<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Evaluasi Siswa</title>

<style>

body{
    font-family:Arial;
    margin:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

th{
    background:#4CAF50;
    color:white;
}

</style>

</head>

<body>

<h2>Data Evaluasi Siswa</h2>

<table id="tabel">
</table>

<script>

fetch("URL_APPS_SCRIPT_KAMU")
.then(res => res.json())
.then(data => {

    let html = "";

    data.forEach((row,index)=>{

        html += "<tr>";

        row.forEach(col=>{

            if(index==0)
            {
                html += "<th>"+col+"</th>";
            }
            else
            {
                html += "<td>"+col+"</td>";
            }

        });

        html += "</tr>";

    });

    document.getElementById("tabel").innerHTML = html;

});

</script>

</body>
</html>
